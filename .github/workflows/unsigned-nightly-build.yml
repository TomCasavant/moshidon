    - uses: actions/checkout@v3
    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'corretto'
        cache: gradle
    
    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    # Removed Decode Keystore step

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_SDK_ROOT" > ./mastodon/local.properties
      env:
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    - name: Build with Gradle
      run: ./gradlew assembleNightly
      # Removed signing environment variables

    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v3.1.2
      with:
       name: moshidon-nightly.apk
       path: ./mastodon/build/outputs/apk/nightly/moshidon-nightly.apk
